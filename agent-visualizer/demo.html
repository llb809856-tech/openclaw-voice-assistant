<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Agent 基地 - 游戏化 Agent 管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 32px; }
        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .stat-icon {
            font-size: 40px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        .stat-label { font-size: 14px; color: rgba(255,255,255,0.6); }
        .stat-value { font-size: 28px; font-weight: 700; }
        
        /* Agents */
        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .agent-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .agent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .agent-card.status-green { border-left: 4px solid #10b981; }
        .agent-card.status-blue { border-left: 4px solid #3b82f6; }
        .agent-card.status-yellow { border-left: 4px solid #f59e0b; }
        .agent-card.status-red { border-left: 4px solid #ef4444; }
        
        .agent-avatar {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
        }
        .avatar-emoji {
            font-size: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .status-indicator {
            position: absolute;
            bottom: 0;
            right: 0;
            font-size: 24px;
            background: rgba(0,0,0,0.8);
            border-radius: 50%;
            padding: 4px;
        }
        .agent-info { text-align: center; margin-bottom: 20px; }
        .agent-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .agent-status { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
        .agent-task { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.5; }
        
        .agent-progress { margin-bottom: 16px; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .agent-tokens {
            display: flex;
            justify-content: space-around;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .token-item { display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .token-icon { font-size: 16px; }
        .token-green { color: #10b981; }
        .token-yellow { color: #f59e0b; }
        .token-red { color: #ef4444; }
        .token-value { font-weight: 600; }
        
        /* Logs */
        .activity-log {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 400px;
            overflow-y: auto;
        }
        .log-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        .log-item:last-child { border-bottom: none; }
        .log-item:hover {
            background: rgba(255,255,255,0.03);
            padding-left: 8px;
            border-radius: 8px;
        }
        .log-time { font-size: 12px; color: rgba(255,255,255,0.4); min-width: 50px; }
        .log-agent { font-weight: 600; min-width: 100px; display: flex; align-items: center; gap: 6px; }
        .log-action { color: rgba(255,255,255,0.8); flex: 1; }
        .log-success { color: #10b981; }
        .log-info { color: #3b82f6; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.6);
        }
        .loading-spinner {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🌌</span>
                <h1>Agent 基地</h1>
            </div>
            <div style="display: flex; gap: 10px;">
                <button style="background: rgba(255,255,255,0.1); border: none; border-radius: 8px; padding: 10px 14px; font-size: 20px; cursor: pointer;">🔔</button>
                <button style="background: rgba(255,255,255,0.1); border: none; border-radius: 8px; padding: 10px 14px; font-size: 20px; cursor: pointer;">⚙️</button>
            </div>
        </header>

        <!-- Stats -->
        <section class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div>
                    <div class="stat-label">Token 消耗</div>
                    <div class="stat-value" id="tokenTotal">¥0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div>
                    <div class="stat-label">任务完成</div>
                    <div class="stat-value" id="tasksCompleted">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🟢</div>
                <div>
                    <div class="stat-label">运行中</div>
                    <div class="stat-value" id="runningAgents">0/0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div>
                    <div class="stat-label">效率</div>
                    <div class="stat-value">98%</div>
                </div>
            </div>
        </section>

        <!-- Agents -->
        <section>
            <h2 class="section-title">🤖 Agent 团队</h2>
            <div class="agents-grid" id="agents">
                <div class="loading">
                    <div class="loading-spinner">🔄</div>
                    <p style="margin-top: 16px;">正在加载 Agent 数据...</p>
                </div>
            </div>
        </section>

        <!-- Logs -->
        <section>
            <h2 class="section-title">📜 活动日志</h2>
            <div class="activity-log" id="logs">
                <div class="loading">
                    <p>正在加载日志...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const WS_BASE = 'ws://localhost:8000/ws';
        
        // 自动重连配置
        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;
        const connectionStatus = document.createElement('div');
        connectionStatus.id = 'connection-status';
        connectionStatus.style.cssText = 'position:fixed;top:10px;right:10px;padding:8px 16px;border-radius:8px;font-size:12px;z-index:9999;';
        document.body.appendChild(connectionStatus);

        // WebSocket 连接
        function connectWebSocket() {
            updateConnectionStatus('connecting', '🔄 连接中...');
            
            try {
                ws = new WebSocket(WS_BASE);
                
                ws.onopen = () => {
                    console.log('✅ WebSocket 已连接');
                    updateConnectionStatus('connected', '🟢 已连接');
                    reconnectAttempts = 0;
                };
                
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    console.log('📥 收到数据:', data);
                    
                    if (data.type === 'stats_update' && data.stats) {
                        updateStats(data.stats);
                    } else if (data.type === 'agent_update' && data.agent) {
                        updateAgent(data.agent);
                    }
                };
                
                ws.onclose = () => {
                    console.log('❌ WebSocket 断开');
                    updateConnectionStatus('disconnected', '🔴 已断开');
                    
                    // 自动重连（指数退避）
                    if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                        reconnectAttempts++;
                        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
                        console.log(`🔄 ${delay}ms 后重连 (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`);
                        updateConnectionStatus('reconnecting', `🔄 ${delay/1000}s 后重连...`);
                        setTimeout(connectWebSocket, delay);
                    } else {
                        console.log('⚠️ 重连失败，请刷新页面');
                        updateConnectionStatus('failed', '⚠️ 重连失败，请刷新页面');
                    }
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket 错误:', error);
                    updateConnectionStatus('error', '❌ 连接错误');
                };
            } catch (error) {
                console.error('WebSocket 连接失败:', error);
                updateConnectionStatus('error', '❌ 连接失败');
            }
        }
        
        // 更新连接状态显示
        function updateConnectionStatus(status, text) {
            const colors = {
                connected: 'background:rgba(16,185,129,0.9);color:#fff;',
                connecting: 'background:rgba(59,130,246,0.9);color:#fff;',
                disconnected: 'background:rgba(107,114,128,0.9);color:#fff;',
                reconnecting: 'background:rgba(245,158,11,0.9);color:#fff;',
                error: 'background:rgba(239,68,68,0.9);color:#fff;',
                failed: 'background:rgba(239,68,68,0.9);color:#fff;'
            };
            connectionStatus.style.cssText += colors[status] || '';
            connectionStatus.textContent = text;
        }
        
        // 更新统计数据
        function updateStats(stats) {
            document.getElementById('tokenTotal').textContent = `¥${stats.tokenTotal.toLocaleString()}`;
            document.getElementById('tasksCompleted').textContent = stats.tasksCompleted;
            document.getElementById('runningAgents').textContent = `${stats.runningAgents}/${stats.totalAgents}`;
        }
        
        // 更新单个 Agent
        function updateAgent(agent) {
            const agentElement = document.querySelector(`[data-agent-id="${agent.id}"]`);
            if (agentElement) {
                // 更新 Agent 卡片
                agentElement.outerHTML = renderAgent(agent);
            }
        }

        // 获取状态颜色
        function getStatusConfig(status) {
            const config = {
                idle: { label: '空闲', color: 'green', emoji: '😴' },
                thinking: { label: '思考中', color: 'blue', emoji: '🤔' },
                working: { label: '工作中', color: 'yellow', emoji: '💪' },
                error: { label: '错误', color: 'red', emoji: '😵' },
                offline: { label: '离线', color: 'gray', emoji: '💤' }
            };
            return config[status] || config.idle;
        }

        // 获取 Token 颜色
        function getTokenColor(remaining) {
            if (remaining >= 50) return 'green';
            if (remaining >= 20) return 'yellow';
            return 'red';
        }

        // 渲染 Agent 卡片
        function renderAgent(agent) {
            const status = getStatusConfig(agent.status);
            const tokenColor = getTokenColor(agent.tokenRemaining);
            
            return `
                <div class="agent-card status-${status.color}" data-agent-id="${agent.id}">
                    <div class="agent-avatar">
                        <div class="avatar-emoji">${agent.avatar}</div>
                        <div class="status-indicator">${status.emoji}</div>
                    </div>
                    <div class="agent-info">
                        <h3 class="agent-name">${agent.name}</h3>
                        <p class="agent-status">${status.label}</p>
                        <p class="agent-task">${agent.task}</p>
                    </div>
                    <div class="agent-progress">
                        <div class="progress-label">
                            <span>⚡ 进度</span>
                            <span>${Math.round(agent.progress)}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${agent.progress}%"></div>
                        </div>
                    </div>
                    <div class="agent-tokens">
                        <div class="token-item">
                            <span class="token-icon">💰</span>
                            <span class="token-value">${agent.tokenUsed}</span>
                        </div>
                        <div class="token-item">
                            <span class="token-icon token-${tokenColor}">❤️</span>
                            <span class="token-value">${Math.round(agent.tokenRemaining)}%</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染日志
        function renderLog(log) {
            const typeClass = log.type === 'success' ? 'log-success' : 'log-info';
            return `
                <div class="log-item ${typeClass}">
                    <span class="log-time">${log.time}</span>
                    <span class="log-agent">${log.avatar} ${log.agent}</span>
                    <span class="log-action">${log.action}</span>
                </div>
            `;
        }

        // 加载数据
        async function loadData() {
            try {
                // 加载统计数据
                const statsRes = await fetch(`${API_BASE}/api/stats`);
                const stats = await statsRes.json();
                document.getElementById('tokenTotal').textContent = `¥${stats.tokenTotal.toLocaleString()}`;
                document.getElementById('tasksCompleted').textContent = stats.tasksCompleted;
                document.getElementById('runningAgents').textContent = `${stats.runningAgents}/${stats.totalAgents}`;

                // 加载 Agent 列表
                const agentsRes = await fetch(`${API_BASE}/api/agents`);
                const agents = await agentsRes.json();
                document.getElementById('agents').innerHTML = agents.map(renderAgent).join('');

                // 加载日志
                const logsRes = await fetch(`${API_BASE}/api/logs`);
                const logs = await logsRes.json();
                document.getElementById('logs').innerHTML = logs.map(renderLog).join('');

            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('agents').innerHTML = `
                    <div class="loading">
                        <p>⚠️ 无法连接到后端 API</p>
                        <p style="font-size: 12px; margin-top: 8px;">请确保后端服务正在运行：<br>cd backend && python3 main.py</p>
                    </div>
                `;
            }
        }

        // 初始加载
        loadData();
        
        // 启动 WebSocket 连接
        connectWebSocket();

        // 每 3 秒刷新一次数据（HTTP 轮询作为 WebSocket 的备用）
        setInterval(loadData, 3000);
        
        // 页面关闭时清理
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
