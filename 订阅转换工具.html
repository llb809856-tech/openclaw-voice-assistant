<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订阅转换工具 - 本地版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 40px;
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    h1 { color: #00d9ff; text-align: center; margin-bottom: 10px; font-size: 32px; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 14px; }
    .security-notice {
      background: rgba(0,255,136,0.1);
      border-left: 4px solid #00ff88;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 25px;
    }
    .security-notice h3 { color: #00ff88; font-size: 16px; margin-bottom: 8px; }
    .security-notice p { color: #ddd; font-size: 14px; }
    label { display: block; color: #00d9ff; font-weight: bold; margin-bottom: 8px; font-size: 15px; }
    input, textarea, select {
      width: 100%; padding: 12px 15px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(0,217,255,0.3);
      border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 20px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: #00d9ff;
      box-shadow: 0 0 10px rgba(0,217,255,0.3);
    }
    textarea { min-height: 200px; font-family: 'Courier New', monospace; font-size: 13px; }
    .btn {
      background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
      color: #000; border: none; padding: 15px 30px;
      border-radius: 8px; font-size: 16px; font-weight: bold;
      cursor: pointer; width: 100%; margin-bottom: 15px; transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
    .output-area { margin-top: 25px; }
    .output-area label { color: #00ff88; }
    .tips {
      background: rgba(255,193,7,0.1);
      border-left: 4px solid #ffc107;
      padding: 15px; border-radius: 8px; margin-top: 25px;
    }
    .tips h3 { color: #ffc107; font-size: 16px; margin-bottom: 10px; }
    .tips ol { color: #ddd; padding-left: 20px; font-size: 14px; }
    .tips li { margin-bottom: 8px; }
    .loading { text-align: center; padding: 20px; color: #00d9ff; display: none; }
    .error {
      background: rgba(255,107,107,0.1);
      border-left: 4px solid #ff6b6b;
      padding: 15px; border-radius: 8px;
      margin-top: 15px; color: #ff6b6b; display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 订阅转换工具（本地版）</h1>
    <p class="subtitle">完全在本地运行，数据不会上传到任何服务器</p>
    
    <div class="security-notice">
      <h3>✅ 安全说明</h3>
      <p>本工具完全在本地浏览器运行，你的订阅链接和配置<strong>不会上传到任何服务器</strong>。</p>
    </div>

    <form id="convertForm">
      <label for="nodesInput">🔗 节点链接（vless:// 或 vmess://，可粘贴多个）</label>
      <textarea id="nodesInput" placeholder="vless://uuid@host:port?security=tls&sni=xxx&type=ws&path=/xxx#节点名称"></textarea>

      <label for="outputFormat">📄 输出格式</label>
      <select id="outputFormat">
        <option value="clash">Clash / Clash Meta</option>
        <option value="singbox">Sing-box</option>
      </select>

      <label for="configName">🏷️ 配置名称</label>
      <input type="text" id="configName" placeholder="我的机场" value="美国机场">

      <button type="submit" class="btn">🚀 开始转换</button>
      <button type="button" class="btn btn-secondary" onclick="downloadConfig()">💾 下载配置文件</button>
    </form>

    <div class="loading" id="loading">⏳ 正在转换中，请稍候...</div>
    <div class="error" id="error"></div>

    <div class="output-area">
      <label for="output">📋 Clash 配置（复制后导入 Clash）</label>
      <textarea id="output" readonly placeholder="转换后的配置将显示在这里..."></textarea>
    </div>

    <div class="tips">
      <h3>📖 使用教程</h3>
      <ol>
        <li>在 X-UI 面板点击节点的<strong>"二维码"</strong>图标</li>
        <li>复制 <strong>vless://</strong> 或 <strong>vmess://</strong> 开头的完整链接</li>
        <li>粘贴到上方文本框</li>
        <li>点击<strong>"开始转换"</strong>按钮</li>
        <li>复制下方生成的配置内容</li>
        <li>打开 Clash for Mac → 配置 → 新建配置 → 粘贴 → 保存</li>
      </ol>
    </div>
  </div>

  <script>
    let generatedConfig = '';

    document.getElementById('convertForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const configName = document.getElementById('configName').value;
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const output = document.getElementById('output');
      
      loading.style.display = 'block';
      error.style.display = 'none';
      output.value = '';
      
      setTimeout(() => {
        try {
          const nodesText = document.getElementById('nodesInput').value;
          const nodeUrls = nodesText.split('\n').filter(line => line.trim());
          
          let nodes = [];
          for (const nodeUrl of nodeUrls) {
            const node = parseNode(nodeUrl.trim());
            if (node) nodes.push(node);
          }
          
          if (nodes.length === 0) {
            throw new Error('没有找到有效的节点，请检查链接格式');
          }
          
          generatedConfig = generateClashConfig(nodes, configName);
          output.value = generatedConfig;
          
        } catch (err) {
          error.textContent = '❌ 错误：' + err.message;
          error.style.display = 'block';
        } finally {
          loading.style.display = 'none';
        }
      }, 500);
    });

    function parseNode(url) {
      try {
        if (url.startsWith('vless://')) return parseVLESS(url);
        if (url.startsWith('vmess://')) return parseVMess(url);
      } catch (e) {
        console.error('解析节点失败:', e);
      }
      return null;
    }

    function parseVLESS(url) {
      // vless://uuid@host:port?security=tls&sni=xxx&type=ws&path=/xxx#remarks
      const withoutProtocol = url.replace('vless://', '');
      const [uuidPart, rest] = withoutProtocol.split('@');
      const uuid = uuidPart;
      
      // 分离 # 后面的备注
      let hostPortParams = rest;
      let remarks = '';
      const hashIndex = rest.indexOf('#');
      if (hashIndex !== -1) {
        remarks = decodeURIComponent(rest.substring(hashIndex + 1));
        hostPortParams = rest.substring(0, hashIndex);
      }
      
      // 分离 ? 前面的 host:port 和后面的参数
      const [hostPort, queryString] = hostPortParams.split('?');
      const [host, port] = hostPort.split(':');
      
      // 解析参数
      const params = {};
      if (queryString) {
        queryString.split('&').forEach(param => {
          const [key, value] = param.split('=');
          params[decodeURIComponent(key)] = decodeURIComponent(value || '');
        });
      }
      
      return {
        name: remarks || `VLESS-${host}-${port}`,
        server: host,
        port: parseInt(port),
        type: 'vless',
        uuid: uuid,
        network: params.type || 'tcp',
        tls: params.security === 'tls' || params.security === 'reality',
        servername: params.sni || host,
        wsPath: params.path || '/',
        wsHost: params.host || params.sni || host
      };
    }

    function parseVMess(url) {
      try {
        const base64 = url.replace('vmess://', '');
        const json = JSON.parse(atob(base64));
        return {
          name: json.ps || json.name || `VMess-${json.add}-${json.port}`,
          server: json.add || json.server,
          port: parseInt(json.port),
          type: 'vmess',
          uuid: json.id,
          alterId: parseInt(json.aid || 0),
          cipher: json.scy || 'auto',
          network: json.net || 'tcp',
          wsPath: json.path || '/',
          wsHost: json.host || json.add,
          tls: json.tls === 'tls'
        };
      } catch (e) {
        return null;
      }
    }

    function generateClashConfig(nodes, configName) {
      const proxyList = nodes.filter(n => n).map(node => {
        let config = `  - name: "${node.name}"
    type: ${node.type}
    server: ${node.server}
    port: ${node.port}
    uuid: ${node.uuid}`;
        
        if (node.type === 'vmess') {
          config += `
    alterId: ${node.alterId || 0}
    cipher: ${node.cipher || 'auto'}`;
        }
        
        if (node.tls) {
          config += `
    tls: true
    servername: ${node.servername}`;
        }
        
        if (node.network === 'ws') {
          config += `
    network: ws
    ws-opts:
      path: "${node.wsPath}"
      headers:
        Host: ${node.wsHost}`;
        }
        
        return config;
      }).join('\n\n');

      const proxyNames = nodes.filter(n => n).map(n => `      - "${n.name}"`).join('\n');

      return `# Clash 配置 - ${configName}
# 生成时间：${new Date().toLocaleString('zh-CN')}
# ⚠️ 此配置完全在本地生成，未上传到任何服务器

proxies:
${proxyList}

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
${proxyNames}
  - name: ♻️ 自动选择
    type: url-test
    proxies:
${proxyNames}
    url: https://www.google.com/gen_204
    interval: 300
  - name: 📺 YouTube
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT
  - name: 🤖 OpenAI
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
  - name: 📲 Telegram
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT
  - name: 🌏 国内媒体
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
  - name: 📢 Google
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT
  - name: 🍎 Apple
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT

rules:
  - DOMAIN-SUFFIX,openai.com,🤖 OpenAI
  - DOMAIN-SUFFIX,chatgpt.com,🤖 OpenAI
  - DOMAIN-SUFFIX,claude.ai,🤖 OpenAI
  - DOMAIN-SUFFIX,anthropic.com,🤖 OpenAI
  - DOMAIN-KEYWORD,openai,🤖 OpenAI
  - DOMAIN-SUFFIX,youtube.com,📺 YouTube
  - DOMAIN-SUFFIX,ytimg.com,📺 YouTube
  - DOMAIN-SUFFIX,googlevideo.com,📺 YouTube
  - DOMAIN-SUFFIX,telegram.org,📲 Telegram
  - DOMAIN-SUFFIX,telegram.me,📲 Telegram
  - DOMAIN-SUFFIX,t.me,📲 Telegram
  - DOMAIN-SUFFIX,google.com,📢 Google
  - DOMAIN-SUFFIX,googleapis.com,📢 Google
  - DOMAIN-SUFFIX,gstatic.com,📢 Google
  - DOMAIN-SUFFIX,netflix.com,🌍 国外媒体
  - DOMAIN-SUFFIX,spotify.com,🌍 国外媒体
  - DOMAIN-SUFFIX,twitter.com,🌍 国外媒体
  - DOMAIN-SUFFIX,facebook.com,🌍 国外媒体
  - DOMAIN-SUFFIX,instagram.com,🌍 国外媒体
  - DOMAIN-SUFFIX,bilibili.com,🌏 国内媒体
  - DOMAIN-SUFFIX,iqiyi.com,🌏 国内媒体
  - DOMAIN-SUFFIX,qq.com,🌏 国内媒体
  - DOMAIN-SUFFIX,apple.com,🍎 Apple
  - DOMAIN-SUFFIX,icloud.com,🍎 Apple
  - DOMAIN-SUFFIX,cn,🌏 国内媒体
  - DOMAIN-KEYWORD,.cn,🌏 国内媒体
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - GEOIP,CN,🌏 国内媒体
  - MATCH,🐟 漏网之鱼
`;
    }

    function downloadConfig() {
      if (!generatedConfig) {
        alert('请先生成配置！');
        return;
      }
      const blob = new Blob([generatedConfig], { type: 'text/yaml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `clash-config-${new Date().getTime()}.yaml`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
